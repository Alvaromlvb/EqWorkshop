name: Build Executables (Linux, Windows, macOS)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v3

    - name: Instalar Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Instalar PyInstaller
      run: pip install pyinstaller

    - name: Construir ejecutable
      run: |
        pyinstaller --onefile EqWorkshop.py

    - name: Subir ejecutable como artefacto
      uses: actions/upload-artifact@v3
      with:
        name: EqWorkshop-${{ matrix.os }}
        path: |
          dist/EqWorkshop*
